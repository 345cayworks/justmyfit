# Netlify configuration — Just My Fit Clothing Store
# Static site served from the repository root (no build step).

[build]
  publish = "."
  command = "echo 'Static site — no build step.'"

# Security headers for all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache images for a week (long enough to be fast, short enough that
# swapped-in store photos refresh quickly)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Stylesheet / scripts: cache a day (filenames aren't fingerprinted)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Friendly redirects for common typos / old paths
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/products"
  to = "/products.html"
  status = 301

[[redirects]]
  from = "/gallery"
  to = "/gallery.html"
  status = 301

[[redirects]]
  from = "/faq"
  to = "/faq.html"
  status = 301

# Catch-all: send unknown URLs to the branded 404 page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
